# =============================================================================
# HK Time Deposit Provider Catalog
# =============================================================================
# Source of truth for everywhere the skill needs to scrape.
#
# Schema for each provider:
#   id:           stable snake_case key (used in snapshot.json + artifact)
#   name:         display name (used in the artifact)
#   category:     traditional_bank | virtual_bank | wealth_platform
#   home:         marketing/home page (for citation link in the artifact)
#   sources:      list of pages to scrape; each has:
#       url:        page URL
#       currency:   HKD | USD | both
#       method:     fetch | chrome
#         - fetch  -> WebFetch (page is server-rendered, fast path)
#         - chrome -> mcp__Claude_in_Chrome (page is JS-rendered or behind a
#                     promo modal / requires consent banner click)
#       notes:      caveats: "new money only", "online only", min ticket, etc.
#       last_known_quirks: optional free-text reminders for the scraper turn
#
# Tenors captured everywhere: 1M, 3M, 6M, 12M
# Amount tier captured by default: the "headline" tier each provider
#   advertises, plus the highest published tier. The snapshot can hold
#   multiple tiers per (provider,currency,tenor) row.
#
# Maintenance: when a provider redesigns their rates page, only this YAML
# changes — the SKILL.md flow stays the same.
# =============================================================================

# =============================================================================
# FIRECRAWL — production scraper for scheduled jobs
# =============================================================================
# All scheduled refreshes go through Firecrawl. The local Playwright scripts
# in `verification/` are kept as a fallback for ad-hoc verification and for
# the cases where Firecrawl credits are exhausted.
#
# Required: FIRECRAWL_API_KEY environment variable.
#
# The standard extraction schema (used by every rate-page source unless
# overridden in firecrawl_config.schema) is:
#
firecrawl:
  default_endpoint: "https://api.firecrawl.dev/v1/extract"
  default_options:
    formats: ["extract", "markdown"]
    onlyMainContent: false       # Many rate pages put tables in side-rails
    waitFor: 3000                # ms — let JS-rendered tables populate
    timeout: 25000               # ms hard cap per page
    cacheTtl: 14400              # 4h — safe for daily-cron refresh
    proxy: "auto"                # rotate IPs (defeats some HK bank geo-gating)
  default_schema:
    type: object
    properties:
      rates_as_of_date:
        type: string
        description: "The 'as of' or 'last updated' date printed on the page (any format)"
      rows:
        type: array
        items:
          type: object
          properties:
            provider_name: { type: string, description: "The bank or fintech name on this row" }
            currency:      { type: string, enum: ["HKD","USD","CNY","RMB","GBP","AUD","JPY"] }
            tenor_months:  { type: integer, description: "Tenor in months: 1, 3, 6, or 12" }
            rate_pct:      { type: number,  description: "APY as published, e.g. 2.75 for 2.75% p.a." }
            min_deposit_amount: { type: ["integer", "null"], description: "Minimum deposit threshold in the row currency, null if not specified" }
            new_funds_only:     { type: boolean }
            online_channel_only:{ type: boolean }
            promo_end_date:     { type: ["string", "null"] }
            sub_product:        { type: ["string", "null"], description: "e.g. 'HSBC One', 'HSBC Premier', 'Cash+ Fixed (HKD)'" }
        description: "Every tenor × currency × tier row visible on the page"

# Why schema-driven extraction beats regex:
#   - Firecrawl's extractor runs an LLM pass that understands "this is a
#     rate table" without us specifying selectors.
#   - When the bank redesigns their page (e.g. moves from HTML table to
#     a JS-rendered card grid), our schema still works — no parser rewrite.
#   - Tiered providers (ICBC Asia × 3 min-deposit tiers, Public Bank × 3,
#     CMB Wing Lung × 2) come back as separate rows naturally.
#   - HSBC One vs HSBC Premier disambiguation falls out of `sub_product`.

# =============================================================================
# AGGREGATORS — primary sources
# =============================================================================
# These third-party comparison sites publish structured rate tables covering
# 15-22 HK providers each, dated to within 1-7 days. The scraper should hit
# these FIRST and pull rates from the table; direct provider URLs below are
# used for (a) verification — does the aggregator agree with the source? —
# and (b) capturing any rows the aggregator misses (e.g. new digital banks).
#
# Why aggregators first:
#   - One fetch covers 20+ providers — way less brittle than 20 separate
#     scrapes each fighting JS rendering + consent modals.
#   - Aggregators are themselves competitively pressured to be accurate
#     and freshly-dated — they timestamp every page.
#   - For the external client view, citing a neutral 3rd party
#     ("rates per StashAway HK, 26 May 2026") is more defensible than
#     citing a bank's own promo page.
#
# Aggregator precedence rules (encoded in SKILL.md):
#   1. Try aggregators in order until one returns a parseable table.
#   2. For each provider × tenor × currency, the aggregator value is the
#      headline rate UNLESS the direct fetch returns a fresher (newer
#      timestamp) value AND it disagrees materially (>15bps). Then prefer
#      the direct value and log a `disagreement` note in the row.
#   3. If an aggregator publishes a tiered table (e.g. ICBC at three
#      different min-deposit tiers), capture them all and tag with
#      `tier_min_ccy`.
# =============================================================================

aggregators:

  - id: stashaway_hk
    name: StashAway HK
    note: |
      Competitor wealth manager that publishes the most comprehensive
      HK TD comparison. Updated weekly. Structured Markdown table parses
      cleanly from WebFetch. Covers 15 traditional + 7 virtual banks.
    sources:
      - url: https://www.stashaway.hk/r/best-hkd-time-deposit-interest-rates-and-offers
        currency: HKD
        method: fetch
      - url: https://www.stashaway.hk/r/best-usd-time-deposit-interest-rates-and-offers
        currency: USD
        method: fetch
        notes: |
          USD page sometimes returns empty body via WebFetch — escalate
          to Chrome if the first response has no rate table.

  - id: moneyhero_hk
    name: MoneyHero HK
    note: |
      NASDAQ-listed (MNY) financial product aggregator. Daily-updated.
      Good for cross-checking promotional rates and capturing minor
      banks not on StashAway.
    sources:
      - url: https://www.moneyhero.com.hk/zh/banking/blog/time-deposit/hkd
        currency: HKD
        method: chrome
        notes: Chinese version; English version often empty via WebFetch.

  - id: moneysmart_hk
    name: MoneySmart HK
    note: |
      Aggregator focused on virtual banks + new-money promos. Useful
      cross-check for the digital-bank tier.
    sources:
      - url: https://blog.moneysmart.hk/en/budgeting/fixed-time-deposit-hkd-preferential-interest-rate-comparison/
        currency: HKD
        method: chrome
      - url: https://www.moneysmart.hk/en/savings-account/time-deposit-ms
        currency: HKD
        method: chrome

  - id: syfe_blog
    name: Syfe HK Magazine
    note: |
      Syfe's own monthly HK TD comparison. Self-citable for the
      external view. Use as primary for Syfe's own rate and as a
      cross-check for the 5 banks Syfe benchmarks against.
    sources:
      - url: https://www.syfe.com/hk/magazine/tag/time-deposit-rate-hong-kong/
        currency: both
        method: fetch
        notes: Tag index — pick the latest post.

  - id: ezone_hk
    name: ezone.hk
    note: |
      Hong Kong tech/finance media. Daily-updated "18大銀行港元定期存款利率比較"
      page. Chinese only. Useful for sanity-checking traditional bank rates.
    sources:
      - url: https://ezone.hk/article/20054761
        currency: HKD
        method: fetch

  - id: moneyhk101
    name: MoneyHK101
    note: |
      "12 banks 1-12M HKD rate comparison" — updated weekly. Lighter
      coverage than StashAway but useful when StashAway is stale.
    sources:
      - url: https://www.moneyhk101.com/hkd-fixed-deposit/
        currency: HKD
        method: fetch


