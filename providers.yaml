        currency: both
        method: fetch
        notes: |
          SCB headline is usually the "online exclusive" promo rate for
          new funds. Standard board rates also published — capture both.
        last_known_quirks: |
          - Promo cards near top of page; full board further down as PDF link.
          - If only PDF available, switch this source to method: chrome and
            navigate the PDF reader.

