        notes: |
          BOCHK posts a rich currency × tenor × tier matrix; the static
          fetch returns an empty body, so Chrome navigation is required.
          Capture the full HKD and USD slices.

  - id: hang_seng
    name: Hang Seng Bank
    category: traditional_bank
    home: https://www.hangseng.com/
    sources:
      - url: https://cms.hangseng.com/cms/emkt/pmo/grp06/p04/eng/index.html
        currency: both
        method: chrome
        notes: |
          Promo landing page (per StashAway citation). Prestige/Preferred
