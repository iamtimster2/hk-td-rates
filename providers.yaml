      # product page, which often shows board rates only).
      - url: https://www.hsbc.com.hk/accounts/offers/deposits/
        currency: both
        method: fetch
        notes: |
          HSBC publishes "preferential" rates for new-money / online-only.
          Capture BOTH the standard board rate and the preferential rate
          when both are shown; flag preferential rows with `promo: true`.
        last_known_quirks: |
          - Rates table lives in a tabbed section: HKD / USD / Other currencies.
          - Tiers: typically HKD 10k / 500k / 1M+.

