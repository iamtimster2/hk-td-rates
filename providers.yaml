            - { type: scroll, direction: down }
            - { type: wait, milliseconds: 1500 }
            - { type: click, selector: "a:has-text('Cash+ Fixed (HKD)')" }
            - { type: wait, milliseconds: 1500 }
            - { type: scroll, direction: up }
          # No schema override — uses the default firecrawl.default_schema
          # which captures (currency × tenor × rate) rows.

      # FALLBACK + GROUND TRUTH FOR COMPETITORS.
      # Syfe publishes a curated monthly HK TD comparison blog. This is
      # the single best source for both our own rate AND for the canonical
      # competitor numbers — and it's self-citable for the client view.
      # URL pattern changes monthly; the scraper should:
      #   1. Fetch https://www.syfe.com/hk/magazine/tag/time-deposit-rate-hong-kong/
      #   2. Pick the latest post linked from that tag page
      #   3. Parse rates from the prose + embedded tables
      # If the live Chrome scrape of cash-plus-fixed fails, fall back to
      # the rate from the latest blog post (with `notes: "from monthly blog"`).
      - url: https://www.syfe.com/hk/magazine/tag/time-deposit-rate-hong-kong/
        currency: both
        method: fetch
        priority: fallback
        notes: |
          Syfe's monthly HK TD rate comparison blog. Used as fallback for
          our own rate AND as ground-truth secondary source for competitors
          (HSBC, BOCHK, SCBHK, Hang Seng, ICBC Asia, CCB Asia, OCBC,
          Fusion, Mox, etc.). When a competitor's own site is unreachable
          but the Syfe blog cites them with a rate + date, surface that row
          with `notes: "via Syfe monthly comparison"` and the blog URL as
          source_url.


# =============================================================================
# Snapshot schema (for reference — produced by the skill in data/latest.json):
# =============================================================================
#
# {
#   "as_of_utc":   "2026-05-28T03:14:00Z",
#   "as_of_local": "2026-05-28 HKT",
#   "tenors":      ["1M", "3M", "6M", "12M"],
#   "currencies":  ["HKD", "USD"],
#   "rates": [
#     {
#       "provider_id":   "hsbc",
#       "provider_name": "HSBC",
#       "category":      "traditional_bank",
#       "currency":      "HKD",
#       "tenor":         "3M",
#       "apy_pct":       3.80,
#       "tier_min_ccy":  500000,
#       "tier_max_ccy":  null,
#       "promo":         true,
#       "new_money_only":true,
#       "online_only":   false,
#       "promo_end_date":"2026-06-30",
#       "product_type":  "td",
